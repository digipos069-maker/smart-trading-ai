services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT: development

  frontend:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend
